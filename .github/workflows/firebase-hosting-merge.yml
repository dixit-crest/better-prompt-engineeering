name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Add this step to use a patched Node version
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.23.1'

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BETTER_PROMPT_ENGINEERING }}
          channelId: live
          projectId: better-prompt-engineering
